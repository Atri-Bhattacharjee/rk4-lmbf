name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libeigen3-dev python3-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: brew install cmake eigen

      - name: Cache vcpkg
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-eigen3-x64-windows-v1
          restore-keys: |
            vcpkg-eigen3-x64-windows-

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          C:\vcpkg\vcpkg install eigen3:x64-windows

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          source ./scripts/cmake-venv-args.sh
          cmake --preset release \
            -DPython_EXECUTABLE="$CMAKE_VENV_PYTHON" \
            -Dpybind11_DIR="$CMAKE_PYBIND11_DIR"
          cmake --build --preset release --parallel "$(nproc)"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          source ./scripts/cmake-venv-args.sh
          cmake --preset release \
            -DPython_EXECUTABLE="$CMAKE_VENV_PYTHON" \
            -Dpybind11_DIR="$CMAKE_PYBIND11_DIR"
          cmake --build --preset release --parallel "$(sysctl -n hw.ncpu)"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          $cmakeVenvArgs = & .\scripts\cmake-venv-args.ps1
          cmake --preset release @cmakeVenvArgs `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build --preset release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/ci-test.sh

      - name: Test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/ci-test.sh

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\ci-test.ps1
